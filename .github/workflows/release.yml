name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.26"

      - name: Extract version
        run: |
          VERSION="${GITHUB_REF#refs/tags/}"
          echo "VERSION=$VERSION" >> $GITHUB_ENV

      - name: Build Linux binary
        run: |
          echo "Building linux-amd64..."
          go build -ldflags="-s -w" -o v-star-${{ env.VERSION }}-linux-amd64 ./cmd/v-star

      - name: Build Darwin amd64
        run: |
          GOOS=darwin GOARCH=amd64 go build -ldflags="-s -w" -o v-star-${{ env.VERSION }}-darwin-amd64 ./cmd/v-star

      - name: Build Darwin arm64
        run: |
          GOOS=darwin GOARCH=arm64 go build -ldflags="-s -w" -o v-star-${{ env.VERSION }}-darwin-arm64 ./cmd/v-star

      - name: Build Windows binary
        run: |
          GOOS=windows go build -ldflags="-s -w" -o v-star-${{ env.VERSION }}-windows-amd64.exe ./cmd/v-star

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Build Python wheel
        run: |
          cd examples/python_bridge
          python -m pip install build
          python -m build
          cd ../..

      - name: List files
        run: |
          echo "=== Binaries ==="
          ls -la v-star-*
          echo "=== Python ==="
          ls -la examples/python_bridge/dist/

      - name: Generate changelog
        run: |
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          if [ -n "$PREV_TAG" ]; then
            CHANGES=$(git log --format="- %s (%h)" $PREV_TAG..HEAD -- . ':!.github')
          else
            CHANGES="Initial release"
          fi
          echo "full_changelog=$CHANGES" >> $GITHUB_ENV

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.VERSION }}
          name: Release ${{ env.VERSION }}
          body: |
            ## What's New
            ${{ env.full_changelog }}

            ## Installation

            ### Go
            ```bash
            go install github.com/lubasinkal/v-star/cmd/v-star@v${{ env.VERSION }}
            ```

            ### Python
            ```bash
            pip install vstar-py
            ```

            Or download an asset from below.
          draft: false
          prerelease: false
          files: |
            v-star-${{ env.VERSION }}-linux-amd64
            v-star-${{ env.VERSION }}-darwin-amd64
            v-star-${{ env.VERSION }}-darwin-arm64
            v-star-${{ env.VERSION }}-windows-amd64.exe
            examples/python_bridge/dist/*.whl
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}