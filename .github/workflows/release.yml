name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.26"

      - name: Build CLI
        run: |
          VERSION=$(git describe --tags --always --dirty)
          go build -ldflags "-s -w -X main.version=$VERSION" -o v-star ./cmd/v-star

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: v-star
          path: v-star

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - uses: actions/download-artifact@v4
        with:
          name: v-star
          path: .

      - name: Make executable
        run: chmod +x v-star

      - name: Run semantic-release
        uses: cycjimmy/semantic-release-action@v4
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          branches: main
          extra_args: |
            --plugin @semantic-release/github
            --github-asset v-star
          buildArtifacts: true