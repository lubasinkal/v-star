name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.26"

      - name: Get version
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_ENV

      - name: Build binaries
        run: |
          go build -ldflags="-s -w" -o v-star-$VERSION-linux-amd64 ./cmd/v-star
          go build -ldflags="-s -w" -o v-star-$VERSION-darwin-amd64 ./cmd/v-star
          go build -ldflags="-s -w" -o v-star-$VERSION-darwin-arm64 ./cmd/v-star
          go build -ldflags="-s -w" -o v-star-$VERSION-windows-amd64.exe ./cmd/v-star

      - name: Build Python wheel
        run: |
          cd examples/python_bridge
          python -m build
          cd ../..

      - name: Generate changelog
        id: changelog
        run: |
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          if [ -n "$PREV_TAG" ]; then
            CHANGES=$(git log --format="- %s (%h)" $PREV_TAG..HEAD -- . ':!.github')
          else
            CHANGES=$(git log --format="- %s (%h)" HEAD~20..HEAD -- . ':!.github')
          fi
          echo "$CHANGES" >> $GITHUB_OUTPUT
          echo "full_changelog=$CHANGES" >> $GITHUB_ENV

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.VERSION }}
          name: Release ${{ env.VERSION }}
          body: |
            ## Changes since last release
            ${{ env.full_changelog }}

            ## Installation

            ### Go
            ```bash
            go install github.com/lubasinkal/v-star/cmd/v-star@v${{ env.VERSION }}
            ```

            ### Python
            ```bash
            pip install vstar-py
            ```

            Or download the wheel from assets below.
          draft: false
          prerelease: false
          files: |
            v-star-${{ env.VERSION }}-*.exe
            v-star-${{ env.VERSION }}-*-amd64
            v-star-${{ env.VERSION }}-darwin-arm64
            examples/python_bridge/dist/*.whl
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload to existing release
        if: failure()
        run: |
          gh release upload ${{ env.VERSION }} v-star-${{ env.VERSION }}-*.exe v-star-${{ env.VERSION }}-*-amd64 v-star-${{ env.VERSION }}-darwin-arm64 examples/python_bridge/dist/*.whl --clobber