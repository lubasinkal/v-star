name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.26"

      - name: Build CLI
        run: |
          go build -ldflags "-s -w" -o v-star ./cmd/v-star

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: v-star
          path: v-star

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: v-star

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          draft: false
          files: |
            v-star
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}